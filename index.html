<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Carreira - Foco em Transferências</title>
    <style>
        :root {
            --bg-color: #0b110e;
            --card-bg: #121e18;
            --border-color: #1f3629;
            --primary-color: #00ff66;
            --text-color: #e2e8f0;
            --text-muted: #8ba396;
            --accent-color: #ffaa00;
            --danger-color: #ff3b30;
            --row-bg-even: #16261e;
            --row-bg-odd: #0d1612;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }
        
        .header { text-align: center; border-bottom: 2px dashed var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-size: 1.8rem; color: var(--primary-color); text-transform: uppercase; }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: #080d0b; border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; outline: none; }
        
        .btn { width: 100%; padding: 12px; background: var(--primary-color); color: #000; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #00cc52; }
        .btn:disabled { background: #1f3629; color: #8ba396; cursor: not-allowed; }
        
        /* Cabeçalho do Jogador */
        .player-info-bar { display: flex; justify-content: space-between; background: #080d0b; padding: 15px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .player-info-bar h2 { font-size: 1.2rem; color: #fff; }
        .player-info-bar .club-name { color: var(--primary-color); font-weight: bold; font-size: 1.2rem; }

        /* Tabela de Histórico (Foco principal) */
        .history-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; }
        .history-table th { background: #080d0b; color: var(--text-muted); padding: 10px; text-align: center; border-bottom: 2px solid var(--border-color); text-transform: uppercase; font-size: 0.8rem; }
        .history-table td { padding: 12px 10px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .history-table tr:nth-child(even) td { background-color: var(--row-bg-even); }
        .history-table tr:nth-child(odd) td { background-color: var(--row-bg-odd); }
        .col-club { text-align: left !important; font-weight: bold; }
        .col-age { color: var(--accent-color); font-weight: bold; }

        /* Hub de Transferências */
        .transfer-hub { background: #080d0b; border: 1px solid var(--accent-color); border-radius: 6px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .transfer-title { color: var(--accent-color); text-transform: uppercase; font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 1px; }
        .proposals-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 600px) { .proposals-grid { grid-template-columns: 1fr 1fr; } }
        
        .proposal-card { background: #121e18; border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; }
        .proposal-card.roulette-spin { animation: pulse 0.1s infinite; border-color: var(--primary-color); }
        .proposal-club { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; min-height: 26px; }
        
        .btn-accept { background: var(--accent-color); color: #000; border: none; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-reject { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 5px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Animação inicial */
        #roulette-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; text-align: center; }
        #roulette-text { font-size: 3rem; color: var(--primary-color); font-weight: bold; margin-top: 20px; text-transform: uppercase; }
        
        .final-stats { display: flex; justify-content: space-around; background: #080d0b; padding: 20px; border-radius: 6px; margin-top: 20px; }
        .final-stat-box { text-align: center; }
        .final-stat-box span { display: block; font-size: 2rem; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="roulette-overlay">
        <h3 style="color: var(--text-muted); text-transform: uppercase;">Sorteando Clube da Base...</h3>
        <div id="roulette-text">Buscando...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Career Simulator</h1>
        </div>

        <div id="screen-setup" class="screen active">
            <div class="form-group">
                <label>Nome do Jogador</label>
                <input type="text" id="player-name" value="Craque Desconhecido">
            </div>
            <div class="form-group">
                <label>Posição Principal</label>
                <select id="player-pos">
                    <option value="ATA">Atacante (Foco em Gols)</option>
                    <option value="MEI">Meio-Campo (Gols e Assists)</option>
                    <option value="ZAG">Zagueiro (Foco em Defesa/Poucos Gols)</option>
                </select>
            </div>
            <button class="btn" onclick="startDraft()">Começar Carreira</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="player-info-bar">
                <div>
                    <h2 id="ui-name">Nome</h2>
                    <span style="color: var(--text-muted); font-size: 0.85rem;" id="ui-pos">POS</span>
                </div>
                <div style="text-align: right;">
                    <div style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Clube Atual</div>
                    <div class="club-name" id="ui-club">Clube</div>
                </div>
            </div>

            <table class="history-table">
                <thead>
                    <tr>
                        <th>Idade</th>
                        <th style="text-align: left;">Clube</th>
                        <th>Gols</th>
                        <th>Asts</th>
                        <th>Títulos</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>

            <div class="transfer-hub" id="transfer-hub" style="display: none;">
                <div class="transfer-title" id="transfer-status">Janela de Transferências Aberta</div>
                <div class="proposals-grid" id="proposals-container">
                    </div>
                <button class="btn btn-reject" id="btn-stay" style="display: none; margin-top: 15px; width: 100%;" onclick="rejectProposals()">Recusar Ofertas e Ficar</button>
            </div>

            <button class="btn" id="btn-simulate" onclick="simulateSeason()">Simular 2 Anos</button>
        </div>

        <div id="screen-end" class="screen">
            <h2 style="text-align: center; color: var(--accent-color); text-transform: uppercase; margin-bottom: 10px;">Fim de Carreira (36 Anos)</h2>
            <p style="text-align: center; color: var(--text-muted);">Sua jornada chegou ao fim. Estes são seus números finais:</p>
            
            <div class="final-stats">
                <div class="final-stat-box">
                    <span id="end-goals">0</span>
                    <label>Gols</label>
                </div>
                <div class="final-stat-box">
                    <span id="end-assists">0</span>
                    <label>Assists</label>
                </div>
                <div class="final-stat-box">
                    <span id="end-trophies">0</span>
                    <label>Títulos</label>
                </div>
            </div>

            <button class="btn" onclick="location.reload()" style="margin-top: 30px;">Jogar Novamente</button>
        </div>
    </div>

    <script>
        const CLUBS = [
            "Real Madrid", "Barcelona", "Atlético Madrid", "Sevilla", 
            "Man City", "Arsenal", "Liverpool", "Chelsea", "Man United", "Tottenham", "Aston Villa",
            "Bayern Munique", "B. Dortmund", "B. Leverkusen", "RB Leipzig",
            "Inter Milão", "Milan", "Juventus", "Napoli", "Roma",
            "PSG", "Monaco", "Marseille", "Lyon",
            "Ajax", "Benfica", "Porto", "Sporting"
        ];

        const TROPHIES = ["🏆 Champions", "🥇 Liga", "🥈 Copa"];

        let player = {
            name: "", pos: "", age: 16, currentClub: "",
            totalGoals: 0, totalAssists: 0, totalTrophies: 0
        };

        function getRandomClub(exclude = "") {
            let club = exclude;
            while(club === exclude) {
                club = CLUBS[Math.floor(Math.random() * CLUBS.length)];
            }
            return club;
        }

        function startDraft() {
            player.name = document.getElementById('player-name').value || "Craque";
            player.pos = document.getElementById('player-pos').value;
            
            const overlay = document.getElementById('roulette-overlay');
            const rouletteText = document.getElementById('roulette-text');
            overlay.style.display = 'flex';

            let ticks = 0;
            const finalClub = getRandomClub();
            
            // Animação da Roleta Inicial
            const interval = setInterval(() => {
                rouletteText.innerText = getRandomClub();
                ticks++;
                if(ticks > 25) { // Para após ~2.5 segundos
                    clearInterval(interval);
                    rouletteText.innerText = finalClub;
                    rouletteText.style.color = "#fff";
                    
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        player.currentClub = finalClub;
                        setupGameScreen();
                    }, 1500);
                }
            }, 100);
        }

        function setupGameScreen() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-game').classList.add('active');
            
            document.getElementById('ui-name').innerText = player.name;
            document.getElementById('ui-pos').innerText = player.pos;
            document.getElementById('ui-club').innerText = player.currentClub;
            
            // Adiciona a primeira linha (Base)
            addHistoryRow(16, player.currentClub, "-", "-", "Contrato Base");
        }

        function addHistoryRow(age, club, goals, assists, trophiesStr) {
            const tbody = document.getElementById('history-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-age">${age}</td>
                <td class="col-club">${club}</td>
                <td>${goals}</td>
                <td>${assists}</td>
                <td style="font-size: 0.8rem;">${trophiesStr || "-"}</td>
            `;
            // Insere no topo
            tbody.insertBefore(tr, tbody.firstChild);
        }

        function simulateSeason() {
            if (player.age >= 36) return;

            // Bloqueia botão durante simulação
            document.getElementById('btn-simulate').disabled = true;
            document.getElementById('btn-simulate').innerText = "Simulando...";
            document.getElementById('transfer-hub').style.display = "none";

            setTimeout(() => {
                // Cálculo de Gols e Assists (2 anos)
                let multiplier = (player.age >= 22 && player.age <= 30) ? 1.5 : 1.0;
                let gBase = player.pos === 'ATA' ? 20 : player.pos === 'MEI' ? 8 : 2;
                let aBase = player.pos === 'MEI' ? 15 : player.pos === 'ATA' ? 5 : 2;

                let goals = Math.floor((gBase + Math.random() * 15) * multiplier * 2); // x2 pois são 2 anos
                let assists = Math.floor((aBase + Math.random() * 10) * multiplier * 2);
                
                player.totalGoals += goals;
                player.totalAssists += assists;
                player.age += 2;

                // Títulos Aleatórios no período
                let wonTrophies = [];
                for(let i=0; i<2; i++) {
                    if(Math.random() < 0.25) wonTrophies.push("🥇 Liga");
                    if(Math.random() < 0.15) wonTrophies.push("🏆 Champions");
                }
                player.totalTrophies += wonTrophies.length;

                // Atualiza UI Histórico
                addHistoryRow(player.age, player.currentClub, goals, assists, wonTrophies.join(", "));

                // Verifica fim de carreira
                if (player.age >= 36) {
                    endGame();
                } else {
                    triggerTransferWindow();
                }
            }, 800);
        }

        function triggerTransferWindow() {
            const hub = document.getElementById('transfer-hub');
            const container = document.getElementById('proposals-container');
            const btnStay = document.getElementById('btn-stay');
            
            hub.style.display = "block";
            document.getElementById('transfer-status').innerText = "Procurando ofertas no mercado...";
            container.innerHTML = "";
            btnStay.style.display = "none";

            // Define se terá 0, 1 ou 2 propostas
            const numProposals = Math.random() < 0.2 ? 0 : Math.random() < 0.6 ? 1 : 2;

            if (numProposals === 0) {
                setTimeout(() => {
                    document.getElementById('transfer-status').innerText = "Nenhuma proposta recebida nesta janela.";
                    document.getElementById('btn-simulate').disabled = false;
                    document.getElementById('btn-simulate').innerText = "Simular Próximos 2 Anos";
                }, 1500);
                return;
            }

            document.getElementById('transfer-status').innerText = "Sorteando Propostas...";

            // Cria os cards para a roleta
            let proposalClubs = [];
            for (let i = 0; i < numProposals; i++) {
                let card = document.createElement('div');
                card.className = "proposal-card roulette-spin";
                card.id = `prop-card-${i}`;
                card.innerHTML = `<div class="proposal-club" id="prop-text-${i}">...</div>`;
                container.appendChild(card);
                
                // Escolhe clube final daquela carta
                let pClub = getRandomClub(player.currentClub);
                while(proposalClubs.includes(pClub)) pClub = getRandomClub(player.currentClub);
                proposalClubs.push(pClub);
            }

            // Animação da Roleta nas cartas
            let ticks = 0;
            const interval = setInterval(() => {
                for (let i = 0; i < numProposals; i++) {
                    document.getElementById(`prop-text-${i}`).innerText = getRandomClub();
                }
                ticks++;
                if (ticks > 20) {
                    clearInterval(interval);
                    document.getElementById('transfer-status').innerText = "Você tem ofertas na mesa!";
                    
                    // Finaliza animação e mostra botões de aceitar
                    for (let i = 0; i < numProposals; i++) {
                        const finalC = proposalClubs[i];
                        const cardEl = document.getElementById(`prop-card-${i}`);
                        cardEl.classList.remove('roulette-spin');
                        cardEl.innerHTML = `
                            <div class="proposal-club">${finalC}</div>
                            <button class="btn-accept" onclick="acceptProposal('${finalC}')">Assinar</button>
                        `;
                    }
                    btnStay.style.display = "block";
                }
            }, 100);
        }

        function acceptProposal(newClub) {
            player.currentClub = newClub;
            document.getElementById('ui-club').innerText = newClub;
            closeTransferWindow();
        }

        function rejectProposals() {
            closeTransferWindow();
        }

        function closeTransferWindow() {
            document.getElementById('transfer-hub').style.display = "none";
            document.getElementById('btn-simulate').disabled = false;
            document.getElementById('btn-simulate').innerText = "Simular Próximos 2 Anos";
        }

        function endGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-end').classList.add('active');
            
            document.getElementById('end-goals').innerText = player.totalGoals;
            document.getElementById('end-assists').innerText = player.totalAssists;
            document.getElementById('end-trophies').innerText = player.totalTrophies;
        }
    </script>
</body>
</html>
