<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Carreira de Futebol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container simulando a tela do celular */
        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: #111;
            padding: 10px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            position: relative;
        }

        /* Top Bar - Estatísticas Globais */
        .top-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .stat-box {
            background-color: #fff;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 2px;
            font-weight: 900;
        }

        .stat-icon {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.1rem;
        }

        .ovr-bar {
            display: flex;
            justify-content: space-between;
            background-color: #4a235a;
            padding: 5px 10px;
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-radius: 2px;
        }

        /* Tabela de Carreira */
        .career-table {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 120px; /* Espaço para a área de ação */
        }

        .table-header {
            display: flex;
            justify-content: flex-end;
            background-color: #1e8449;
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 2px;
            margin-bottom: 2px;
        }

        .table-header span {
            width: 30px;
            text-align: center;
            margin-left: 10px;
        }

        .career-row {
            display: flex;
            background-color: #fff;
            color: #000;
            height: 40px;
            border-radius: 2px;
            overflow: hidden;
        }

        .row-age {
            background-color: #8a2be2;
            color: #fff;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
        }

        .row-age.academy { background-color: #f1c40f; color: #000; }
        .row-age.retired { background-color: #e67e22; }

        .row-club {
            flex-grow: 1;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid #ccc;
        }

        .club-name { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }
        .club-country { font-size: 0.65rem; color: #555; }

        .row-stats {
            display: flex;
            background-color: #a9dfbf; /* Verde claro */
        }

        .row-stats div {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 900;
            border-left: 1px solid rgba(0,0,0,0.1);
        }

        /* Área de Ação (Bottom fixo) */
        .action-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            border-top: 2px solid #333;
            padding: 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn {
            background-color: #ff3b5c; /* Cor TikTok */
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }

        .btn-secondary {
            background-color: #333;
            margin-top: 5px;
        }

        /* Container de Propostas */
        .proposal-box {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .proposal-btn {
            background-color: #fff;
            color: #000;
            border: 2px solid #8a2be2;
            padding: 10px;
            font-weight: 900;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        /* Roleta de Sorteio */
        .slot-machine {
            display: none;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #f1c40f;
            padding: 20px 0;
            animation: pulse 0.1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-stats">
            <div class="stat-box"><span class="stat-icon">⚽</span><span class="stat-value" id="global-goals">0</span></div>
            <div class="stat-box"><span class="stat-icon">👟</span><span class="stat-value" id="global-assists">0</span></div>
            <div class="stat-box"><span class="stat-icon">🏆</span><span class="stat-value" id="global-titles">0</span></div>
            <div class="stat-box" style="border: 2px solid #f1c40f;"><span class="stat-icon">⭐</span><span class="stat-value" id="global-ovr">70</span></div>
        </div>

        <div class="ovr-bar">
            <span>OVR <span id="bar-ovr">70</span></span>
            <span>PAC 85</span>
            <span>SHO 72</span>
            <span>PAS 68</span>
            <span>DRI 75</span>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <div class="table-header">
                Stats por 2 Anos
                <span style="margin-left: 20px;">🏆</span>
                <span>⭐</span>
                <span>⚽</span>
            </div>
        </div>

        <div class="career-table" id="career-table">
            </div>

        <div class="action-area" id="action-area">
            <button class="btn" id="btn-simulate" onclick="simulateSeason()">Simular (16-18 Anos)</button>
            
            <div class="slot-machine" id="slot-machine">
                SORTEANDO... <br> <span id="slot-club-name" style="color: #fff; font-size: 1.2rem;">---</span>
            </div>

            <div class="proposal-box" id="proposal-box">
                </div>
        </div>
    </div>

    <script>
        // Banco de dados de clubes com bandeiras e nível
        const CLUBS = [
            { name: "Man City", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 5 },
            { name: "Arsenal", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 5 },
            { name: "Liverpool", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 5 },
            { name: "Real Madrid", country: "🇪🇸 Spain", tier: 5 },
            { name: "Barcelona", country: "🇪🇸 Spain", tier: 5 },
            { name: "Bayern Munich", country: "🇩🇪 Germany", tier: 5 },
            { name: "PSG", country: "🇫🇷 France", tier: 5 },
            { name: "Inter Milan", country: "🇮🇹 Italy", tier: 5 },
            { name: "AC Milan", country: "🇮🇹 Italy", tier: 4 },
            { name: "Juventus", country: "🇮🇹 Italy", tier: 4 },
            { name: "Borussia D.", country: "🇩🇪 Germany", tier: 4 },
            { name: "Atlético", country: "🇪🇸 Spain", tier: 4 },
            { name: "Chelsea", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 4 },
            { name: "Man United", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 4 },
            { name: "Tottenham", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 4 },
            { name: "Aston Villa", country: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England", tier: 3 },
            { name: "Sevilla", country: "🇪🇸 Spain", tier: 3 },
            { name: "Roma", country: "🇮🇹 Italy", tier: 3 },
            { name: "Napoli", country: "🇮🇹 Italy", tier: 4 },
            { name: "Leverkusen", country: "🇩🇪 Germany", tier: 4 }
        ];

        let player = {
            age: 16,
            ovr: 70,
            totalGoals: 0,
            totalAssists: 0,
            totalTitles: 0,
            currentClub: null
        };

        // Inicia o jogo sorteando um time de base
        function init() {
            player.currentClub = CLUBS[Math.floor(Math.random() * CLUBS.length)];
            addTableRow('A', player.currentClub, 0, 0, 0, 'academy'); // A = Academy (Base)
            updateHeaders();
        }

        function updateHeaders() {
            document.getElementById('global-goals').innerText = player.totalGoals;
            document.getElementById('global-assists').innerText = player.totalAssists;
            document.getElementById('global-titles').innerText = player.totalTitles;
            document.getElementById('global-ovr').innerText = player.ovr;
            document.getElementById('bar-ovr').innerText = player.ovr;
        }

        function addTableRow(ageLabel, club, trophiesLg, trophiesCont, goals, ageClass = '') {
            const table = document.getElementById('career-table');
            const row = document.createElement('div');
            row.className = 'career-row';
            
            row.innerHTML = `
                <div class="row-age ${ageClass}">${ageLabel}</div>
                <div class="row-club">
                    <span class="club-name">${club.name}</span>
                    <span class="club-country">${club.country}</span>
                </div>
                <div class="row-stats">
                    <div>${trophiesLg}</div>
                    <div>${trophiesCont}</div>
                    <div>${goals}</div>
                </div>
            `;
            table.appendChild(row);
            
            // Rolar para o fim da tabela
            table.scrollTop = table.scrollHeight;
        }

        function simulateSeason() {
            const btn = document.getElementById('btn-simulate');
            btn.style.display = 'none'; // Esconde botão

            // Calcula estatísticas para 2 anos baseado no OVR e Tier do clube
            let ageFactor = (player.age >= 24 && player.age <= 30) ? 1.3 : (player.age > 32 ? 0.6 : 1.0);
            
            // Evolução do jogador (OVR sobe até os 28, depois cai)
            if (player.age < 28) player.ovr += Math.floor(Math.random() * 4) + 1;
            else if (player.age > 30) player.ovr -= Math.floor(Math.random() * 3);

            let periodGoals = Math.floor((10 + Math.random() * 25) * ageFactor * (player.ovr/80));
            let periodAssists = Math.floor((5 + Math.random() * 15) * ageFactor * (player.ovr/80));
            
            let tLeague = 0;
            let tCont = 0;

            // Simula Títulos
            for(let i=0; i<2; i++) {
                if(Math.random() * 100 < (player.currentClub.tier * 8)) tLeague++;
                if(player.currentClub.tier >= 4 && Math.random() * 100 < (player.currentClub.tier * 4)) tCont++;
            }

            // Atualiza totais globais
            player.totalGoals += periodGoals;
            player.totalAssists += periodAssists;
            player.totalTitles += (tLeague + tCont);

            // Adiciona a linha de resultado na tabela
            addTableRow(player.age, player.currentClub, tLeague, tCont, periodGoals);
            
            updateHeaders();
            
            // Avança idade
            player.age += 2;

            if (player.age > 36) {
                // Aposentadoria
                addTableRow('R', {name: "APOSENTADORIA", country: "Fim de Carreira"}, '-', '-', '-', 'retired');
                document.getElementById('action-area').innerHTML = `<h3 style="text-align:center; color:#e67e22;">CARREIRA ENCERRADA</h3><button class="btn btn-secondary" onclick="location.reload()">Jogar Novamente</button>`;
                return;
            }

            // Iniciar Roleta de Transferências
            startTransferRoulette();
        }

        function startTransferRoulette() {
            const slotMachine = document.getElementById('slot-machine');
            const clubNameSpan = document.getElementById('slot-club-name');
            const proposalBox = document.getElementById('proposal-box');
            
            slotMachine.style.display = 'block';
            proposalBox.style.display = 'none';

            let ticks = 0;
            
            // Animação trocando os nomes rapidamente a cada 80ms
            const interval = setInterval(() => {
                const randomClub = CLUBS[Math.floor(Math.random() * CLUBS.length)];
                clubNameSpan.innerText = randomClub.name;
                ticks++;

                if (ticks > 25) { // Para após ~2 segundos
                    clearInterval(interval);
                    slotMachine.style.display = 'none';
                    showTransferProposals();
                }
            }, 80);
        }

        function showTransferProposals() {
            const proposalBox = document.getElementById('proposal-box');
            proposalBox.innerHTML = ''; // Limpa anterior
            
            // Quantidade de propostas: 1 a 2
            const numProposals = Math.random() > 0.5 ? 2 : 1;
            let proposals = [];

            while(proposals.length < numProposals) {
                let candidate = CLUBS[Math.floor(Math.random() * CLUBS.length)];
                if (candidate.name !== player.currentClub.name && !proposals.includes(candidate)) {
                    proposals.push(candidate);
                }
            }

            // Renderiza os botões de propostas
            proposals.forEach(club => {
                const btn = document.createElement('button');
                btn.className = 'proposal-btn';
                btn.innerHTML = `<span>✈️ ${club.name}</span> <span style="color:#555">${club.country}</span>`;
                btn.onclick = () => acceptProposal(club);
                proposalBox.appendChild(btn);
            });

            // Opção de ficar no clube atual
            const stayBtn = document.createElement('button');
            stayBtn.className = 'proposal-btn';
            stayBtn.style.borderColor = '#1e8449';
            stayBtn.innerHTML = `<span>🤝 Ficar no ${player.currentClub.name}</span>`;
            stayBtn.onclick = () => acceptProposal(player.currentClub);
            proposalBox.appendChild(stayBtn);

            proposalBox.style.display = 'flex';
        }

        function acceptProposal(selectedClub) {
            player.currentClub = selectedClub;
            
            // Reseta a interface de baixo
            document.getElementById('proposal-box').style.display = 'none';
            const btnSimulate = document.getElementById('btn-simulate');
            btnSimulate.innerText = `Simular (${player.age}-${player.age+2} Anos)`;
            btnSimulate.style.display = 'block';
        }

        // Inicia o jogo ao carregar a página
        window.onload = init;
    </script>
</body>
</html>
